# ParkNet Terminal Starship preset.
# Install: cp this to ~/.config/starship.toml (or `starship preset`-style merge).

format = """
[visitor.center]($style) $character"""

[character]
success_symbol = "[%](bold green)"
error_symbol = "[%](bold red)"

palette = "nublaros"

[palettes.nublaros]
status_green = "#54D875"
warning_red = "#E55454"
label_cream = "#E2E0BF"
